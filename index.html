<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>match</title>
  <meta property="og:title" content="match" />
<meta property="og:description" content="look once. match it." />
<meta property="og:image" content="https://haylortall.github.io/match/preview.png" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://haylortall.github.io/match/" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="match" />
<meta name="twitter:description" content="look once. match it." />
<meta name="twitter:image" content="https://haylortall.github.io/match/preview.png" />

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: #000;
  color: #f5f1ec;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  height: 360vh;
  overflow-x: hidden;
}

button {
  font: inherit;
  color: inherit;
}

/* HELP */
.help-btn {
  position: fixed;
  top: 24px;
  right: 22px;
  z-index: 100;
  width: 36px;
  height: 36px;
  border: 1px solid rgba(245,241,236,.18);
  border-radius: 999px;
  background: rgba(255,255,255,.025);
  color: #f5f1ec;
  cursor: pointer;
  opacity: .5;
}

.help {
  position: fixed;
  top: 72px;
  right: 22px;
  width: min(285px, calc(100vw - 44px));
  padding: 18px;
  border: 1px solid rgba(245,241,236,.14);
  border-radius: 18px;
  background: rgba(0,0,0,.9);
  backdrop-filter: blur(8px);
  font-size: 13px;
  line-height: 1.55;
  opacity: 0;
  pointer-events: none;
  transition: .18s ease;
  z-index: 100;
}

.help.open {
  opacity: .88;
  pointer-events: auto;
}

.help-title {
  opacity: .9;
  margin-bottom: 10px;
}

.help-line {
  opacity: .62;
  margin: 8px 0;
}

.help-small {
  opacity: .38;
  margin-top: 12px;
  font-size: 12px;
}

/* TOPBAR */
.topbar {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 14px;
  z-index: 90;
}

.symbols {
  display: flex;
  gap: 9px;
}

.symbol-btn,
.level-btn,
.next-btn {
  border: 1px solid rgba(245,241,236,.18);
  background: rgba(255,255,255,.025);
  color: #f5f1ec;
  border-radius: 999px;
  min-width: 36px;
  height: 36px;
  padding: 0 12px;
  cursor: pointer;
  transition: .18s ease;
}

.symbol-btn.active {
  background: rgba(245,241,236,.14);
  border-color: rgba(245,241,236,.62);
}

.level-btn {
  padding: 0 18px;
}

/* MAIN */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 92px 22px 74px;
  pointer-events: none;
  z-index: 1;
}

.panel {
  width: min(560px, 92vw);
  text-align: center;
  pointer-events: auto;
}

.title {
  font-size: 13px;
  letter-spacing: .18em;
  text-transform: lowercase;
  opacity: .48;
  margin: 0 0 34px;
  min-height: 18px;
}

.grid {
  width: min(82vw, 520px, calc(100vh - 260px));
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  display: grid;
  gap: clamp(5px, 1.2vw, 9px);
}

.tile {
  border: 1px solid rgba(245,241,236,.22);
  border-radius: clamp(8px, 2vw, 14px);
  display: grid;
  place-items: center;
  font-size: clamp(16px, 5vw, 34px);
  background: rgba(255,255,255,.018);
  color: #f5f1ec;
  cursor: pointer;
  transition:
    transform .35s cubic-bezier(.2,.8,.2,1),
    background .18s ease,
    border .18s ease,
    opacity .18s ease;
}

.tile.on {
  background: rgba(245,241,236,.12);
  border-color: rgba(245,241,236,.72);
  color: #f5f1ec;
}

.message {
  margin-top: 34px;
  font-size: 13px;
  opacity: .45;
  min-height: 18px;
}

.next-btn {
  display: none;
  margin-top: 18px;
  font-size: 13px;
  opacity: .72;
}

.next-btn.show {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.sig {
  position: fixed;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  color: #f5f1ec;
  text-decoration: none;
  font-size: 13px;
  opacity: 0;
  transition: .2s ease;
  pointer-events: none;
  z-index: 20;
}

.sig.show {
  opacity: .38;
  pointer-events: auto;
}

@media (max-height: 700px) {
  .grid {
    width: min(84vw, calc(100vh - 220px));
  }

  .sig.show {
    opacity: 0;
    pointer-events: none;
  }
}
@media (max-width: 520px) {
  .level-btn {
    min-width: 92px;
    white-space: nowrap;
    padding: 0 18px;
  }

  .topbar {
    gap: 10px;
  }

  .symbols {
    gap: 8px;
  }

  .symbol-btn {
    min-width: 36px;
    padding: 0 11px;
  }
}
</style>
</head>

<body>

<button class="help-btn" id="helpBtn">?</button>

<div class="help" id="helpBox">
  <div class="help-title">how to play:</div>
  <div class="help-line">scroll down. remember the pattern.</div>
  <div class="help-line">come back up. try to match it.</div>
  <div class="help-line">change the symbol if you want.</div>
  <div class="help-line">click level to increase difficulty.</div>
  <div class="help-small">that's it ♥︎ good luck.</div>
</div>

<div class="topbar">
  <div class="symbols">
    <button class="symbol-btn active" data-symbol="circle">○</button>
    <button class="symbol-btn" data-symbol="triangle">△</button>
    <button class="symbol-btn" data-symbol="plus">+</button>
    <button class="symbol-btn" data-symbol="corner">⅃</button>
  </div>

  <button class="level-btn" id="levelBtn">level 1</button>
</div>

<div class="stage">
  <div class="panel">
    <div class="title" id="title">scroll to look</div>
    <div class="grid" id="grid"></div>
    <div class="message" id="message">then come back and match it</div>
    <button class="next-btn" id="nextBtn">next</button>
  </div>
</div>

<a class="sig" id="sig" href="https://haylortall.github.io/">♡ taylor</a>

<script>
const grid = document.getElementById("grid");
const title = document.getElementById("title");
const message = document.getElementById("message");
const nextBtn = document.getElementById("nextBtn");
const helpBtn = document.getElementById("helpBtn");
const helpBox = document.getElementById("helpBox");
const sig = document.getElementById("sig");
const levelBtn = document.getElementById("levelBtn");
const symbolButtons = document.querySelectorAll(".symbol-btn");

const symbols = {
  circle: ["○", "●"],
  triangle: ["△", "▲"],
  plus: ["+", "×"],
  corner: ["⅃", "⅂"]
};

const levels = [
  { size: 4, count: 5 },
  { size: 5, count: 8 },
  { size: 6, count: 12 },
  { size: 7, count: 16 }
];

const sass = [
  "correct, unfortunately",
  "annoying, but correct",
  "fine. you got it.",
  "ok memory freak",
  "devastatingly accurate",
  "that was... competent",
  "alright show-off",
  "sadly, yes",
  "not bad. irritating."
];

let level = 0;
let symbolType = "circle";
let targetPattern = [];
let playerPattern = new Set();
let tiles = [];
let hasLooked = false;
let won = false;
let winText = "";

function progress() {
  const max = document.body.scrollHeight - window.innerHeight;
  return max <= 0 ? 0 : window.scrollY / max;
}

function makePattern() {
  const { size, count } = levels[level];
  const total = size * size;
  const picked = new Set();

  while (picked.size < count) {
    picked.add(Math.floor(Math.random() * total));
  }

  targetPattern = Array.from(picked);
}

function buildGrid() {
  const { size } = levels[level];

  grid.innerHTML = "";
  tiles = [];
  playerPattern = new Set();
  hasLooked = false;
  won = false;
  winText = "";

  nextBtn.classList.remove("show");
  levelBtn.textContent = `level ${level + 1}`;
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

  makePattern();

  for (let i = 0; i < size * size; i++) {
    const tile = document.createElement("button");
    tile.className = "tile";
    tile.type = "button";
    tile.textContent = symbols[symbolType][0];

    tile.addEventListener("click", () => {
      if (won) return;

      if (!hasLooked) {
        message.textContent = "look first";
        return;
      }

      if (window.scrollY > 150) {
        message.textContent = "not down here";
        return;
      }

      if (playerPattern.has(i)) {
        playerPattern.delete(i);
      } else {
        playerPattern.add(i);
      }

      renderPlayer();
      checkWin();
    });

    grid.appendChild(tile);
    tiles.push(tile);
  }

  title.textContent = "scroll to look";
  message.textContent = "then come back and match it";
  sig.classList.remove("show");
  window.scrollTo(0, 0);
  renderPlayer();
}

function renderTarget() {
  tiles.forEach((tile, index) => {
    const on = targetPattern.includes(index);
    tile.classList.toggle("on", on);
    tile.textContent = symbols[symbolType][on ? 1 : 0];
  });
}

function renderPlayer() {
  tiles.forEach((tile, index) => {
    const on = playerPattern.has(index);
    tile.classList.toggle("on", on);
    tile.textContent = symbols[symbolType][on ? 1 : 0];
  });
}

function checkWin() {
  const correct =
    playerPattern.size === targetPattern.length &&
    targetPattern.every(index => playerPattern.has(index));

  if (correct) {
    won = true;
    winText = sass[Math.floor(Math.random() * sass.length)];
    title.textContent = "matched";
    message.textContent = winText;
    nextBtn.classList.add("show");
    renderPlayer();
  } else {
    nextBtn.classList.remove("show");
    message.textContent = `${playerPattern.size}/${targetPattern.length}`;
  }
}

function updateScroll() {
  const p = progress();

  sig.classList.toggle("show", p > .94 && window.innerHeight > 700);

  if (won) {
    renderPlayer();
    title.textContent = "matched";
    message.textContent = winText;
    nextBtn.classList.add("show");
  } else if (window.scrollY > 170) {
    hasLooked = true;
    renderTarget();

    if (p < .78) {
      title.textContent = "keep looking";
      message.textContent = "not readable yet";
    } else {
      title.textContent = "memorize";
      message.textContent = "then go back";
    }
  } else {
    renderPlayer();
    title.textContent = hasLooked ? "match it" : "scroll to look";
    message.textContent = hasLooked
      ? `${playerPattern.size}/${targetPattern.length}`
      : "then come back and match it";
  }

  tiles.forEach((tile, index) => {
    let x = 0;
    let y = 0;
    let r = 0;
    let scale = 1;

    if (p > .12 && p < .82) {
      const chaos = Math.sin(((p - .12) / .7) * Math.PI);
      x = Math.sin(index * 2.9 + p * 9) * chaos * 42;
      y = Math.cos(index * 1.8 + p * 7) * chaos * 42;
      r = Math.sin(index * 1.4 + p * 8) * chaos * 70;
      scale = 1 - chaos * .08;
    }

    tile.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg) scale(${scale})`;
  });
}

symbolButtons.forEach(button => {
  button.addEventListener("click", () => {
    symbolButtons.forEach(b => b.classList.remove("active"));
    button.classList.add("active");
    symbolType = button.dataset.symbol;

    if (window.scrollY > 170 && !won) renderTarget();
    else renderPlayer();
  });
});

levelBtn.addEventListener("click", () => {
  level = (level + 1) % levels.length;
  buildGrid();
});

nextBtn.addEventListener("click", () => {
  level = (level + 1) % levels.length;
  buildGrid();
});

helpBtn.addEventListener("click", () => {
  helpBox.classList.toggle("open");
});

window.addEventListener("scroll", updateScroll);
window.addEventListener("resize", updateScroll);

buildGrid();
</script>

</body>
</html>
