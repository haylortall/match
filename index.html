<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>match</title>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: #000;
  color: #f5f1ec;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  overflow-x: hidden;
}

body {
  height: 360vh;
}

button {
  font: inherit;
  color: inherit;
}

/* fixed experience */
.screen {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 26px 20px 42px;
  z-index: 1;
}

.panel {
  width: min(560px, 92vw);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* top controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 34px;
  flex-wrap: wrap;
}

.symbols {
  display: flex;
  gap: 9px;
}

.symbol-btn,
.level-btn,
.next-btn,
.help-btn {
  border: 1px solid rgba(245,241,236,.2);
  background: rgba(255,255,255,.025);
  color: #f5f1ec;
  border-radius: 999px;
  min-width: 38px;
  height: 38px;
  padding: 0 13px;
  cursor: pointer;
  transition: .18s ease;
}

.symbol-btn:hover,
.level-btn:hover,
.next-btn:hover,
.help-btn:hover {
  border-color: rgba(245,241,236,.48);
  background: rgba(255,255,255,.07);
}

.symbol-btn.active {
  background: rgba(245,241,236,.14);
  border-color: rgba(245,241,236,.62);
}

.level-btn {
  padding: 0 18px;
}

/* corner help */
.help-btn {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 999;
}

.help {
  position: fixed;
  top: 62px;
  right: 18px;
  width: min(285px, calc(100vw - 36px));
  padding: 18px 18px 16px;
  border: 1px solid rgba(245,241,236,.14);
  border-radius: 18px;
  background: rgba(0,0,0,.9);
  backdrop-filter: blur(8px);
  font-size: 13px;
  line-height: 1.55;
  opacity: 0;
  pointer-events: none;
  transition: .18s ease;
  z-index: 999;
  text-align: left;
}

.help.open {
  opacity: .88;
  pointer-events: auto;
}

.help-title {
  opacity: .9;
  margin-bottom: 10px;
}

.help-line {
  opacity: .62;
  margin: 8px 0;
}

.help-small {
  opacity: .38;
  margin-top: 12px;
  font-size: 12px;
}

/* text */
.title {
  font-size: 13px;
  letter-spacing: .18em;
  text-transform: lowercase;
  opacity: .48;
  margin: 0 0 34px;
  min-height: 18px;
  text-align: center;
}

.grid {
  width: min(500px, 78vw);
  aspect-ratio: 1 / 1;
  display: grid;
  gap: 8px;
  margin: 0 auto;
}

.tile {
  border: 1px solid rgba(245,241,236,.22);
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: clamp(18px, 5vw, 34px);
  background: rgba(255,255,255,.018);
  color: #f5f1ec;
  cursor: pointer;
  transition:
    transform .35s cubic-bezier(.2,.8,.2,1),
    background .18s ease,
    border .18s ease,
    opacity .18s ease;
}

.tile.on {
  background: rgba(245,241,236,.12);
  border-color: rgba(245,241,236,.72);
}

.message {
  margin-top: 34px;
  font-size: 13px;
  opacity: .45;
  min-height: 18px;
  text-align: center;
}

.next-btn {
  display: none;
  margin-top: 16px;
  font-size: 13px;
  opacity: .72;
}

.next-btn.show {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.sig {
  margin-top: 18px;
  color: #f5f1ec;
  text-decoration: none;
  font-size: 13px;
  opacity: 0;
  transition: .2s ease;
  pointer-events: none;
}

.sig.show {
  opacity: .42;
  pointer-events: auto;
}

@media (max-width: 520px) {
  .screen {
    padding: 22px 14px 42px;
  }

  .controls {
    gap: 8px;
    margin-bottom: 30px;
  }

  .symbols {
    gap: 7px;
  }

  .symbol-btn,
  .level-btn,
  .help-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 12px;
  }

  .level-btn {
    padding: 0 15px;
  }

  .grid {
    width: min(360px, 86vw);
    gap: 7px;
  }
}
</style>
</head>

<body>

<button class="help-btn" id="helpBtn" type="button">?</button>

<div class="help" id="helpBox">
  <div class="help-title">how to suffer correctly</div>
  <div class="help-line">scroll down. stare at the pattern.</div>
  <div class="help-line">come back up. recreate it from memory.</div>
  <div class="help-line">change the symbol if you need emotional support.</div>
  <div class="help-line">click level if you’d like to make it worse.</div>
  <div class="help-small">no prizes. just character development.</div>
</div>

<div class="screen">
  <div class="panel">

    <div class="controls">
      <div class="symbols">
        <button class="symbol-btn active" data-symbol="circle" type="button">○</button>
        <button class="symbol-btn" data-symbol="triangle" type="button">△</button>
        <button class="symbol-btn" data-symbol="plus" type="button">+</button>
        <button class="symbol-btn" data-symbol="corner" type="button">⅃</button>
      </div>

      <button class="level-btn" id="levelBtn" type="button">level 1</button>
    </div>

    <div class="title" id="title">scroll to look</div>
    <div class="grid" id="grid"></div>
    <div class="message" id="message">then come back and match it</div>
    <button class="next-btn" id="nextBtn" type="button">next</button>
    <a class="sig" id="sig" href="https://haylortall.github.io/">♡ taylor</a>

  </div>
</div>

<script>
const grid = document.getElementById("grid");
const title = document.getElementById("title");
const message = document.getElementById("message");
const nextBtn = document.getElementById("nextBtn");
const helpBtn = document.getElementById("helpBtn");
const helpBox = document.getElementById("helpBox");
const sig = document.getElementById("sig");
const levelBtn = document.getElementById("levelBtn");
const symbolButtons = document.querySelectorAll(".symbol-btn");

const symbols = {
  circle: ["○", "●"],
  triangle: ["△", "▲"],
  plus: ["+", "×"],
  corner: ["⅃", "⅂"]
};

const levels = [
  { size: 4, count: 5 },
  { size: 5, count: 8 },
  { size: 6, count: 12 },
  { size: 7, count: 16 }
];

const sass = [
  "correct, unfortunately",
  "annoying, but correct",
  "fine. you got it.",
  "ok memory freak",
  "devastatingly accurate",
  "that was... competent",
  "alright show-off",
  "sadly, yes",
  "not bad. irritating."
];

let level = 0;
let symbolType = "circle";
let targetPattern = [];
let playerPattern = new Set();
let tiles = [];
let hasLooked = false;
let won = false;
let winText = "";

function getProgress() {
  const max = document.body.scrollHeight - window.innerHeight;
  return max <= 0 ? 0 : window.scrollY / max;
}

function makePattern() {
  const { size, count } = levels[level];
  const total = size * size;
  const picked = new Set();

  while (picked.size < count) {
    picked.add(Math.floor(Math.random() * total));
  }

  targetPattern = Array.from(picked);
}

function buildGrid() {
  const { size } = levels[level];

  grid.innerHTML = "";
  tiles = [];
  playerPattern = new Set();
  hasLooked = false;
  won = false;
  winText = "";

  nextBtn.classList.remove("show");
  sig.classList.remove("show");
  levelBtn.textContent = `level ${level + 1}`;
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

  makePattern();

  for (let i = 0; i < size * size; i++) {
    const tile = document.createElement("button");
    tile.className = "tile";
    tile.type = "button";
    tile.textContent = symbols[symbolType][0];

    tile.addEventListener("click", () => {
      if (won) return;

      if (!hasLooked) {
        message.textContent = "look first";
        return;
      }

      if (window.scrollY > 150) {
        message.textContent = "not down here";
        return;
      }

      if (playerPattern.has(i)) {
        playerPattern.delete(i);
      } else {
        playerPattern.add(i);
      }

      renderPlayer();
      checkWin();
    });

    grid.appendChild(tile);
    tiles.push(tile);
  }

  title.textContent = "scroll to look";
  message.textContent = "then come back and match it";
  window.scrollTo(0, 0);
  renderPlayer();
}

function renderTarget() {
  tiles.forEach((tile, index) => {
    const on = targetPattern.includes(index);
    tile.classList.toggle("on", on);
    tile.textContent = symbols[symbolType][on ? 1 : 0];
  });
}

function renderPlayer() {
  tiles.forEach((tile, index) => {
    const on = playerPattern.has(index);
    tile.classList.toggle("on", on);
    tile.textContent = symbols[symbolType][on ? 1 : 0];
  });
}

function checkWin() {
  const correct =
    playerPattern.size === targetPattern.length &&
    targetPattern.every(index => playerPattern.has(index));

  if (correct) {
    won = true;
    winText = sass[Math.floor(Math.random() * sass.length)];
    title.textContent = "matched";
    message.textContent = winText;
    nextBtn.classList.add("show");
    sig.classList.add("show");
    renderPlayer();
  } else {
    nextBtn.classList.remove("show");
    sig.classList.remove("show");
    message.textContent = `${playerPattern.size}/${targetPattern.length}`;
  }
}

function updateScroll() {
  const p = getProgress();

  if (won) {
    renderPlayer();
    title.textContent = "matched";
    message.textContent = winText;
    nextBtn.classList.add("show");
    sig.classList.add("show");
  } else if (window.scrollY > 170) {
    hasLooked = true;
    renderTarget();

    if (p < .78) {
      title.textContent = "keep looking";
      message.textContent = "not readable yet";
    } else {
      title.textContent = "memorize";
      message.textContent = "then go back";
      sig.classList.add("show");
    }
  } else {
    renderPlayer();
    sig.classList.remove("show");

    if (!hasLooked) {
      title.textContent = "scroll to look";
      message.textContent = "then come back and match it";
    } else {
      title.textContent = "match it";
      message.textContent = `${playerPattern.size}/${targetPattern.length}`;
    }
  }

  tiles.forEach((tile, index) => {
    let x = 0;
    let y = 0;
    let r = 0;
    let scale = 1;

    if (p > .12 && p < .82) {
      const chaos = Math.sin(((p - .12) / .7) * Math.PI);
      x = Math.sin(index * 2.9 + p * 9) * chaos * 42;
      y = Math.cos(index * 1.8 + p * 7) * chaos * 42;
      r = Math.sin(index * 1.4 + p * 8) * chaos * 70;
      scale = 1 - chaos * .08;
    }

    tile.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg) scale(${scale})`;
  });
}

symbolButtons.forEach(button => {
  button.addEventListener("click", () => {
    symbolButtons.forEach(b => b.classList.remove("active"));
    button.classList.add("active");
    symbolType = button.dataset.symbol;

    if (window.scrollY > 170 && !won) {
      renderTarget();
    } else {
      renderPlayer();
    }
  });
});

levelBtn.addEventListener("click", () => {
  level = (level + 1) % levels.length;
  buildGrid();
});

nextBtn.addEventListener("click", () => {
  level = (level + 1) % levels.length;
  buildGrid();
});

helpBtn.addEventListener("click", (event) => {
  event.stopPropagation();
  helpBox.classList.toggle("open");
});

document.addEventListener("click", (event) => {
  if (!event.target.closest("#helpBox") && !event.target.closest("#helpBtn")) {
    helpBox.classList.remove("open");
  }
});

window.addEventListener("scroll", updateScroll);
window.addEventListener("resize", updateScroll);

buildGrid();
</script>

</body>
</html>
